name: Weekly Auto-Publish Schedule

on:
  schedule:
    - cron: '0 22 * * 5'  # Friday 22:00 UTC = Saturday 00:00 Israel time
  workflow_dispatch:       # allow manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run auto-publish
        run: python auto_publish.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sidur_live.html
          git diff --staged --quiet && echo "No changes" && exit 0
          WEEK=$(python -c "import json,re; d=open('sidur_live.html').read(); print(re.search(r'weekStart.*?([0-9-]{10})', d).group(1))")
          git commit -m "סידור אוטומטי שבוע $WEEK"
          git push
