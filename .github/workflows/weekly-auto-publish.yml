name: Weekly Auto-Publish Schedule

on:
  schedule:
    - cron: '30 17 * * 6'  # Saturday 17:30 UTC = Saturday 20:30 Israel time (UTC+3)
  workflow_dispatch:        # allow manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run auto-publish
        run: python auto_publish.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sidur_live.html version.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          WEEK=$(python -c "import json,re; d=open('sidur_live.html').read(); print(re.search(r'weekStart.*?([0-9-]{10})', d).group(1))")
          git commit -m "סידור אוטומטי שבוע $WEEK"
          git push
