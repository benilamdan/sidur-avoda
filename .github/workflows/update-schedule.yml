name: Update Weekly Schedule

on:
  workflow_dispatch:
    inputs:
      week_start:
        description: 'תאריך תחילת שבוע (YYYY-MM-DD, ראשון)'
        required: true
        default: ''
      excel_filename:
        description: 'שם קובץ האקסל ב-repo (למשל schedule.xlsx)'
        required: true
        default: 'schedule.xlsx'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Parse Excel and update schedule
        run: python parse_schedule.py "${{ github.event.inputs.excel_filename }}" "${{ github.event.inputs.week_start }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sidur_live.html
          git diff --staged --quiet || git commit -m "סידור שבוע ${{ github.event.inputs.week_start }}"
          git push
